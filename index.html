<!DOCTYPE html>
<html>
  <head>
    <title>
      Rock Paper Scissors
    </title>
    <style>
      button
      {
        border: none;
        background-color: white;
        color: black;
      }
      button:hover
      {
        cursor: pointer;
        filter: brightness(0.8);
      }
      button:active
      {
        cursor: grabbing;
        filter: brightness(0.6);
      }
      p 
      {
        color: white;
      }
      .icon
      {
        background-color: transparent;
        border: none;
        height: 65px;
      }
      .but
      {
        background-color: black;
        border: 4px solid white;
        margin-left: 20px;
        margin-right: 20px;
        padding: 40px;
        border-radius: 100%;
      }
      .Result
      {
        font-size: 25px;
        font-weight: bold;
        margin-top: 40px;
        margin-bottom: 40px;
      }
      .Moves
      {
        margin-bottom: 50px;
      }
      .Score
      {
        margin-bottom: 50px;
      }
      .reset
      {
        font-size: 18px;
        border: none;
        padding: 10px 8px;
        border-radius: 20px;
      }
    </style>
  </head>
  <body style="background-color: black; font-family: Arial">
    <p style="color: white; font-weight: bold; font-size: 35px;">Rock Paper Scissors</p>
    <button class="but" onclick="play('Rock')"><img src="images/rock-emoji.png" class="icon"></button>
    <button class="but" onclick="play('Paper')"><img src="images/paper-emoji.png" class="icon"></button>
    <button class="but" onclick="play('Scissors')"><img src="images/scissors-emoji.png" class="icon"></button>
    <p class="Result">Play!</p>
    <p class="Moves">Pick a Move!</p>
    <p class="Score"></p>
    <button onclick="ResetScore()" class="reset">Reset Score</button>
    <script src="script.js"></script>
  </body>
</html>
